---
name: Commit Terramaid Results

"on":
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['**.tf']

jobs:
  commit-terramaid-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # ── 1. Search recursively for styled Mermaid files ──────────────
      - name: Find styled Mermaid files
        id: find
        run: |
          FILES=$(find . -name "*_tm_style-*.mmd" \
            -not -path "./.git/*")

          if [ -z "$FILES" ]; then
            MSG="No *_tm_style-*.mmd files found. Nothing to commit."
            echo "::warning::${MSG}"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── 2. Route each file to its nearest tf-*/results/ folder ──────
      - name: Move files to results folders
        if: steps.find.outputs.found == 'true'
        id: move
        run: |
          # Write summary to a file — avoids backtick interpolation
          # when passed through GitHub Actions context variables
          printf "" > /tmp/summary.md

          FILES_LIST="${{ steps.find.outputs.files }}"
          MOVED=false
          while IFS= read -r FILE; do
            SEARCH=$(dirname "$FILE")
            TF_ROOT=""

            while [ "$SEARCH" != "." ] && [ "$SEARCH" != "/" ]; do
              if [[ "$(basename "$SEARCH")" == tf-* ]]; then
                TF_ROOT="$SEARCH"
                break
              fi
              SEARCH=$(dirname "$SEARCH")
            done

            if [ -z "$TF_ROOT" ]; then
              FNAME=$(basename "$FILE")
              echo "::warning::${FNAME} not inside a tf-*/ dir — skipping."
              continue
            fi

            DEST="$TF_ROOT/results"
            mkdir -p "$DEST"
            mv "$FILE" "$DEST/"
            FNAME=$(basename "$FILE")
            printf -- "- %s -> %s/\n" "$FNAME" "$DEST" >> /tmp/summary.md
            MOVED=true

          done <<< "$FILES_LIST"

          echo "moved=${MOVED}" >> "$GITHUB_OUTPUT"

      # ── 3. Push branch and open PR ───────────────────────────────────
      - name: Create branch and open Pull Request
        if: steps.move.outputs.moved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automation/diagram-updates-${{ github.run_id }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}"
          RUN_URL="${RUN_URL}/actions/runs/${{ github.run_id }}"

          git config user.name "github-actions[bot]"
          git config user.email \
            "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .
          git diff --staged --quiet || git commit -m \
            ":bricks: Add Terramaid styled diagram results [skip ci]"
          git push origin "$BRANCH"

          printf "## Terramaid Diagram Results\n\n" > /tmp/pr_body.md
          printf "Files moved to results/ folders:\n\n" >> /tmp/pr_body.md
          cat /tmp/summary.md >> /tmp/pr_body.md
          printf "\n_Workflow run: %s_\n" "$RUN_URL" >> /tmp/pr_body.md

          gh pr create \
            --title ":bricks: Infrastructure related changes." \
            --body-file /tmp/pr_body.md \
            --base main \
            --head "$BRANCH"
